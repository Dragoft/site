				$('.iframe').fadeOut(400);
				setTimeout(function (){

			}
		} else {
			if($("#iframe").length <1){
				var iframe = document.createElement('iframe');
				iframe.setAttribute('name','frame');
				iframe.setAttribute('class','iframe');
				iframe.setAttribute('id','iframe');
				document.querySelector('.blog').appendChild(iframe);
			} else {
				setTimeout(function (){
					$('.iframe').fadeIn(400);

	<!-- Url Controller -->
	<script>
	/* 	Powered By https://blog.csdn.net/weixin_42403306/article/details/105861346
		Read data from Url.							 */

	function GetQueryString(name) {
		var reg = new RegExp("(^|&)" + name + "=([^&]*)(&|$)", "i");
		var r = window.location.search.substr(1).match(reg);
		var context = "";
		if (r != null)
			context = decodeURIComponent(r[2]);
		reg = null;
		r = null;
		return context == null || context == "" || context == "undefined" ? "undefined" : context;
	}

	function changeURLStatic(name, value) {
		let url = changeURLParam(location.href, name, value);
		history.replaceState(null, null, url);
	}

	function changeURLParam(url, name, value) {
		if (typeof value === 'string') {
			value = value.toString().replace(/(^\s*)|(\s*$)/, "");
		}
		let url2;
		if (!value) { // remove
			let reg = eval('/(([\?|&])' + name + '=[^&]*)(&)?/i');
			let res = url.match(reg);
			if (res) {
				if (res[2] && res[2] === '?') { // before has ?
					if (res[3]) { // after has &
						url2 = url.replace(reg, '?');
					} else {
						url2 = url.replace(reg, '');
					}
				} else {
					url2 = url.replace(reg, '$3');
				}
			}
		} else {
			let reg = eval('/([\?|&]' + name + '=)[^&]*/i');
			if (url.match(reg)) { // edit
				url2 = url.replace(reg, '$1' + value);
			} else { // add
				let reg = /([?](\w+=?)?)[^&]*/i;
				let res = url.match(reg);
				url2 = url;
				if (res) {
					if (res[0] !== '?') {
						url2 += '&';
					}
				} else {
					url2 += '?';
				}
				url2 += name + '=' + value;
			}
		}
		return url2;
	}

	if (GetQueryString('id')!='undefined') {
		var TargetBlog = GetQueryString('id');
		if (TargetBlog=='Homepage') {
			BlogPage('blog/' + TargetBlog + '/page.html');
		} else {
			for (var i = 0; i < BlogList.length; i++) {
				if (BlogList[i]['src']==TargetBlog + '/') {
					BlogPage('blog/' + TargetBlog + '/page.html');
					break;
				} else {
					if (i==BlogList.length-1) {
						BlogPage('blog/Homepage/error.html');
					}
				}
			}
		}
	} else {
		document.getElementById('iframe').src = window.location.href.split('org',1)[0] + 'org/blog/Homepage/page.html';
	}



	// 操作 Cookie	by ChatGPT
	function setCookie(Value) {
		var now = new Date();
		var oneWeekLater = new Date(now.getTime() + 7 * 24 * 60 * 60 * 1000); 
		var expires = oneWeekLater.toUTCString();
		document.cookie = "Cookie=" + Value + "; expires=" + expires;
		return expires;
	}

	function getCookie(name) {
		var pattern = new RegExp('(?:^|; )' + name + '=([^;]*)');
		var matches = document.cookie.match(pattern);
		if (matches) {
			return decodeURIComponent(matches[1]);
		}
		return undefined;
	}

	</script>
