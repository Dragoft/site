	var rs = [document.title, window.location.href, "$('.iframe').fadeIn(400);"];

</div>



<div class="main" >
	<br class="f-1" />
	<h1>广场</h1>
	<div class="t-2">
		<span>欢迎来到本站广场。</span>
		<br />
		<span>这里是互联网世界中一个不起眼的角落，很高兴能遇见你！</span>
		<br />
		<br class="f-1" />
		<h2>友情链接</h2>

		<div style="user-select: none; white-space: nowrap;" >
			<a href="https://tatsuno.top/" target="_blank" class="t-3" style="background-color: rgb(217, 227, 252);" >
				<img src="../../../src/icon.png" class="t-4" onload="$(this).addClass('fade-in-1')" id="load-img" />
			</a>
			<div class="t-5" >
				<span class="t-6" style="color: rgba(113, 199, 173, 1);" >Tatsuno Yuu 的博客</span>
				<br />
				<span class="t-7">一个记录个人生活的小型博客网站。</span>
			</div>
		</div>
		<br class="f-1" />
		<div style="user-select: none; white-space: nowrap;" >
			<a href="javascript:;" target="_blank" class="t-3" >
				<img src="img1.png" class="t-4" onload="$(this).addClass('fade-in-1')" id="load-img" />
			</a>
			<div class="t-5" >
				<span class="t-6" style="" >空白网址</span>
				<br />
				<span class="t-7">暂时还未开放友链功能。</span>
			</div>
		</div>

	</div>

	<br class="f-1" />
	<br class="f-1" />
	<br class="f-1" />

	<h1>留言板</h1>
	<div class="t-2" >
		<span style="white-space: nowrap;" >这是个美好的小世界，请温柔以待。</span>
		<br />
		<span>第 <textarea class="textarea Tpage" autocomplete="off" maxlength="3" onfocus="this.select();" >1</textarea> 页留言：</span>
	</div>


	<br class="f-1" />
	<div class="commentBox" ></div>
	<br class="f-1" />

	<textarea class="textarea Tname" placeholder="昵称" autocomplete="off" maxlength="20"></textarea>
	<textarea class="textarea Tcontent" placeholder="内容" autocomplete="off" maxlength="100"></textarea>

	<span class="bottomBox" >
		<span class="btn1 hint--right hint--rounded" data-hint="使用须知
————————————
此评论系统不支持 Html、Markdown 语法。
超过 5 行的留言将被折叠。

严禁发布任何广告、政治、色情内容。
博主不会对留言的内容负责。
请勿故意删除他人留言。
请勿恶意调用本站的评论系统 API。" >关于</span>
		<span class="btn1" style="margin-left: 5px;" onclick="init()" >刷新</span>
		<span class="count" >剩余 100 字</span>
	</span>
	<a href="javascript:;" onclick="sent()" class="sent">留言</a>

	<div class="pagebtn" >
		<span class="page">共 0 页 ( 0 条留言 )</span>
		<br />
		<a href="javascript:;" onclick="turnPage(-1)" class="turn">上一页</a>
		|
		<a href="javascript:;" onclick="turnPage(1)" class="turn">下一页</a>
	</div>

	<br class="f-1" />
	<br class="f-1" />
	<br class="f-1" />
	<br class="f-1" />
	<br class="f-1" />
	<br class="f-1" />

	<br class="f-1 f-3" />
	<br class="f-1 f-3" />
	<br class="f-1 f-3" />
</div>





<script src="../../../js/jquery.base64.js" ></script>
<script src="script.js" ></script>
<script>

	errN = 0;
	wait = 0;
	if (document.domain!='') {
		init();
	} else {
		console.warn('[' + dateFormatter('HH:mm:ss', new Date()) + '] The comment data will not be loaded in the local environment.');
	}


	// 跳转页面
	$('.Tpage').on('keyup', function () {
		 if(event.which == 13){
			var Tpage = Number(document.querySelector('.Tpage').value);
			document.querySelector('.Tpage').value = page;
			$('.Tpage').focus()

			if (typeof Tpage === 'number') {
				if (Tpage > 0) {
					if (Tpage <= PageAll) {
						if (Tpage != page) {
							page = Tpage;
							loadComment(page);
							document.querySelector('.Tpage').value = page;
							$('.Tpage').focus()
						}
					}
				}
			}
		}
	})

	// 统计字数
	$('.Tcontent').on('keyup', function () {
		if (document.querySelector('.Tcontent').value.length>=90) {
			$('.count').css('color', 'rgba(255, 50, 50, 0.7)');
		} else {
			$('.count').css('color', 'rgba(98, 185, 229, 0.8)');
		}
		var n = 100 - document.querySelector('.Tcontent').value.length;
		document.querySelector('.count').innerHTML = '剩余 ' + n + ' 字';
	})

</script>




</body>
</html>
