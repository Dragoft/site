<!DOCTYPE HTML>
<html lang="zh">

<head>
	<title>博客</title>
	<meta charset="UTF-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="stylesheet" type="text/css" href="style.css">
	<script src="https://s3.pstatp.com/cdn/expire-1-M/jquery/3.3.1/jquery.min.js"></script>
	<script src="../../js/search.js"></script>

	<!-- Load Blog Data -->
	<script src="../data.js" ></script>

	<!-- Mobile Device -->
</head>

<body style="-ms-overflow-style: none;" id="body" >
<script>
	var rs = [document.title, 'Homepage', "fullscreenOFF(), $('.iframe').fadeIn(400);"];
	window.parent.postMessage(rs,"*");
	if (window.screen.width > 900) {
		window.document.oncontextmenu = function(){ 
			return false;
		}
	}
	if (document.domain!="") {
		parent.changeURLStatic('id', 'Homepage');
	}

	function fun1() {
		var fun = `
		swal({
			title: "<div style='text-align: left; margin-left: 10%;' >日志 <span style='opacity: 0.3; vertical-align: middle;' >2023/12/31</span></div>",
			text: "<hr style='border: none; border-top: 1px solid rgba(151, 153, 153, 0.2); width: 80%; text-align: center; margin-top: -20px;' /><div style='text-align: left; margin-left: 10%; margin-top: 15px;' >搜索引擎版本：1.1.0<br /><br />修复当搜索到的项中含重复字符时出现的严重问题<br />优化搜索结果的视觉样式<br /></div>",
			confirmButtonText: "关闭",

			html: true,
			allowOutsideClick: true,
		},);`
		var rs = [document.title, 'Homepage', fun];
		window.parent.postMessage(rs,"*");
	}

</script>



<!-- Mian -->

<div class="main" >
	<br class="t-2" />
	<br class="t-2" />
	<span class="title" ><ins style="text-decoration-color: rgba(167, 208, 230, 0.9); text-decoration-thickness: 7px;" ><span class="title-1"></span> Blo</ins>g.</span>
	<div class="box" >

		<div class="box-5" >
			<div id="search" >
				<textarea type="text" id="searchInput" onfocus="this.select();" maxlength="14" placeholder="想找哪篇文章？" autocomplete="off" ></textarea>
				<ul class="search-result" ></ul>
			</div>
			<ins class="t-8" onclick="fun1();" >Ver. 1.1.0</ins>
			<span class="t-7" ></span>
		</div>
		<br class="t-2" />
		<div class="box-1" ></div>
		<div class="box-2" >
			<img src="../../src/Haku.webp" class="haku-img" onload="$(this).addClass('fade-in-1')" />

			<a href="https://music.163.com/#/user/home?id=6288053607" target="_blank" title="网易云音乐" >
				<img src="../../src/footer/网易云音乐.png" class="t-6" style="top: 40px;" onload="$(this).addClass('fade-in-2')" />
			</a>
			<a href="https://space.bilibili.com/3494354685528792" target="_blank" title="哔哩哔哩" >
				<img src="../../src/footer/bilibili.png" class="t-6" style="top: 80px" onload="$(this).addClass('fade-in-1')" />
			</a>

			<div class="t-3">
				<span style="color: rgba(151, 153, 153, 1); font-size: 24px;" >Dragoft 的博客.</span>
				<br />
				<span class="text" >最后更新：<span style="text-decoration: underline; text-decoration-color: rgba(113, 199, 173, 0.8); " id="update" >DATE ERROR.</span></span>
			</div >
		</div>
		<div class="box-3" >
			<img src="hopper.png" class="hopper" onload="$(this).addClass('fade-in-1')" />
			<div class="t-4">
				<span style="color: rgba(151, 153, 153, 1); font-size: 24px;" >
					<span class="t-10"  onclick="changeTEMP('ALL')" ></span>
					<span style="margin-left: 35px;" >文章分类</span>
				</span>
				<div class="t-5">
					<div onclick="changeTEMP('')" > <span style="color: rgba(249, 249, 249, 1);" >|</span><span class="n1 t-9" >0</span></div>
					<div onclick="changeTEMP('')" > <span style="color: rgba(249, 249, 249, 1);" >|</span><span class="n2 t-9" >0</span></div>
					<div onclick="changeTEMP('')" > <span style="color: rgba(249, 249, 249, 1);" >|</span><span class="n3 t-9" >0</span></div>
				</div>
			</div >
		</div>

		<br class="t-2" />
		<a href="javascript:;" onclick="BlogLast()" class="subpage-blog-last" ></a><a href="javascript:;" onclick="BlogNext()" class="subpage-blog-next" ></a>
		<textarea type="text" id="go" onfocus="this.select();" onkeydown="BlogSubmit(event)" class="go" maxlength="3" name="1" ></textarea>
		<span id="total" ></span>
		<br class="t-2" />
		<br class="t-2" />
		<br class="t-2" />
		<br class="t-2" />
		<br class="t-2" />
	</div>
</div>



<script src="blog.js" ></script>

</body>
</html>
